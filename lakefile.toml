name = "lean_lattices"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["LeanLattices", "CategoryGraph", "category-graph-export"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
# The header linter enforces Mathlib's internal copyright-block + module-docstring
# placement convention, which this downstream repo does not adopt; disable just it.
weak.linter.style.header = false
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.32.0"

[[require]]
name = "aiReviewCiLean"
git = "https://github.com/dzackgarza/ai-review-ci"
subDir = "lean"
rev = "main"

[[lean_lib]]
name = "LeanLattices"

[[lean_lib]]
name = "CategoryGraph"

[[lean_exe]]
name = "category-graph-export"
root = "CategoryGraph.Tools.ExportMain"
supportInterpreter = true

[[lean_exe]]
name = "category-graph-axiom-audit"
root = "CategoryGraph.Tools.AxiomAuditMain"
supportInterpreter = true
